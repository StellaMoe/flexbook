<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBook Debug Mode</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900">

    <!-- 🚨 EMERGENCY ON-SCREEN DEBUGGER LOG -->
    <div id="debug-log-box" class="bg-black text-green-400 p-3 font-mono text-xs w-full max-h-32 overflow-y-auto sticky top-0 z-50 border-b border-green-500">
        📟 System Logger Initialized. Click buttons below...
    </div>

    <!-- 1. AUTH SCREEN (Login / Sign Up) -->
    <div id="auth-screen" class="flex flex-col items-center justify-center min-h-screen px-4 pt-10">
        <div class="text-center mb-6">
            <h1 class="text-blue-600 text-5xl font-bold tracking-tight mb-2">flexbook</h1>
            <p class="text-gray-600 text-md">Connect with friends on your phone.</p>
        </div>
        
        <div class="bg-white p-6 rounded-xl shadow-md w-full max-w-sm">
            <form id="auth-form" class="space-y-4" onsubmit="return false;">
                <input type="email" id="auth-email" placeholder="Email address" required 
                    class="w-full p-3 border border-gray-300 rounded-lg mb-3 block focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="auth-password" placeholder="Password" required 
                    class="w-full p-3 border border-gray-300 rounded-lg mb-4 block focus:outline-none focus:ring-2 focus:ring-blue-500">
                
                <button type="button" id="real-login-btn" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg block mb-2 hover:bg-blue-700 transition">Log In</button>
                <button type="button" id="real-signup-btn" class="w-full bg-green-500 text-white font-bold py-3 rounded-lg block hover:bg-green-600 transition">Create New Account</button>
            </form>
        </div>
    </div>


    <!-- 2. MAIN APP SCREEN (Hidden until logged in) -->
    <div id="app-screen" class="hidden min-h-screen pb-16">
        <header class="bg-white shadow-sm sticky top-0 z-50 px-4 py-3 flex justify-between items-center border-b border-gray-200">
            <h1 class="text-blue-600 text-2xl font-bold tracking-tight">flexbook</h1>
            <button id="real-logout-btn" class="text-gray-500 font-medium hover:text-red-500 bg-gray-100 px-3 py-1 rounded-lg text-sm">Log Out</button>
        </header>

        <main class="max-w-md mx-auto p-4 space-y-4">
            <div class="bg-white p-4 rounded-xl shadow-sm space-y-3 mb-4">
                <div class="flex items-center space-x-2">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold" id="user-avatar">U</div>
                    <input type="text" id="post-input" placeholder="What's on your mind?" class="flex-1 bg-gray-100 rounded-full py-2 px-4 text-sm">
                </div>
                <button id="real-post-btn" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg">Post</button>
            </div>
            <div id="posts-feed" class="space-y-4"></div>
        </main>
    </div>

    <!-- FIREBASE AND APP ENGINE MODULE -->
    <script type="module">
        // Helper to output text directly onto your mobile screen
        const debugBox = document.getElementById('debug-log-box');
        function logDebug(message) {
            debugBox.innerHTML += `<br>⏱️ ${new Date().toLocaleTimeString()}: ${message}`;
            debugBox.scrollTop = debugBox.scrollHeight;
        }

        logDebug("Attempting to load Firebase modules...");

        import { initializeApp } from "https://gstatic.com";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://gstatic.com";
        import { getDatabase, ref, set, push, onValue, update } from "https://gstatic.com";

        logDebug("Firebase core modules loaded perfectly!");

        const firebaseConfig = {
            apiKey: "AIzaSyCcwSy65AdFqgHDeKjw4xTTnvGdFQA9i6Y",
            authDomain: "flexbook-app-7c43c.firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "flexbook-app-7c43c",
            storageBucket: "flexbook-app-7c43c.firebasestorage.app",
            messagingSenderId: "748070005411",
            appId: "1:748070005411:web:9d4082abb2886ebad8ed16"
        };

        let app, auth, db;
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getDatabase(app);
            logDebug("Firebase initialized successfully inside code.");
        } catch (e) {
            logDebug("CRITICAL INITIALIZATION ERROR: " + e.message);
        }

        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const emailInput = document.getElementById('auth-email');
        const passwordInput = document.getElementById('auth-password');
        const postInput = document.getElementById('post-input');
        const postsFeed = document.getElementById('posts-feed');
        const userAvatar = document.getElementById('user-avatar');

        // Monitor Auth State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                logDebug(`State Changed: Logged in as ${user.email}`);
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                userAvatar.innerText = user.email.charAt(0).toUpperCase();
                loadPosts();
            } else {
                logDebug("State Changed: Nobody is logged in.");
                appScreen.classList.add('hidden');
                authScreen.classList.remove('hidden');
            }
        });

        // Safe Click Handlers attached within the module system
        document.getElementById('real-signup-btn').addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            logDebug(`Sign-up clicked for email: ${email}`);
            
            if(!email || !password) {
                logDebug("Error: Email or Password field empty.");
                return alert("Fill fields!");
            }
            
            createUserWithEmailAndPassword(auth, email, password)
                .then(() => logDebug("Account created on Firebase!"))
                .catch(err => logDebug("SIGNUP ERROR: " + err.message));
        });

        document.getElementById('real-login-btn').addEventListener('click', () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            logDebug(`Login clicked for email: ${email}`);
            
            if(!email || !password) {
                logDebug("Error: Email or Password field empty.");
                return alert("Fill fields!");
            }

            signInWithEmailAndPassword(auth, email, password)
                .then(() => logDebug("Login success on Firebase!"))
                .catch(err => logDebug("LOGIN ERROR: " + err.message));
        });

        document.getElementById('real-logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => logDebug("Signout clicked.")).catch(err => logDebug("LOGOUT ERROR: " + err.message));
        });

        document.getElementById('real-post-btn').addEventListener('click', () => {
            const text = postInput.value.trim();
            if(!text) return;
            push(ref(db, 'posts'), {
                author: auth.currentUser.email,
                content: text,
                timestamp: Date.now()
            }).then(() => {
                postInput.value = "";
                logDebug("Post submitted successfully!");
            }).catch(err => logDebug("POST ERROR: " + err.message));
        });

        function loadPosts() {
            onValue(ref(db, 'posts'), (snapshot) => {
                postsFeed.innerHTML = "";
                const data = snapshot.val();
                if (!data) {
                    postsFeed.innerHTML = `<div class="text-center py-4 text-gray-400 text-sm">No posts yet.</div>`;
                    return;
                }
                Object.entries(data).reverse().forEach(([postId, post]) => {
                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-xl shadow-sm mt-4 text-sm";
                    card.innerHTML = `<b class="text-xs text-blue-600">${post.author}</b><p class="mt-1">${post.content}</p>`;
                    postsFeed.appendChild(card);
                });
            });
        }
    </script>
</body>
</html>
