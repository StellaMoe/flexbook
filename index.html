<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBook</title>
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-900">

    <!-- 1. AUTH SCREEN (Login / Sign Up) -->
    <div id="auth-screen" class="flex flex-col items-center justify-center min-h-screen px-4">
        <div class="text-center mb-6">
            <h1 class="text-blue-600 text-5xl font-bold tracking-tight mb-2">flexbook</h1>
            <p class="text-gray-600 text-md">Connect with friends on your phone.</p>
        </div>
        
        <div class="bg-white p-6 rounded-xl shadow-md w-full max-w-sm">
            <form id="auth-form" class="space-y-4" onsubmit="return false;">
                <input type="email" id="auth-email" placeholder="Email address" required 
                    class="w-full p-3 border border-gray-300 rounded-lg mb-3 block focus:outline-none focus:ring-2 focus:ring-blue-500">
                <input type="password" id="auth-password" placeholder="Password" required 
                    class="w-full p-3 border border-gray-300 rounded-lg mb-4 block focus:outline-none focus:ring-2 focus:ring-blue-500">
                
                <button type="button" onclick="window.executeLogin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg block mb-2 hover:bg-blue-700 transition">Log In</button>
                <button type="button" onclick="window.executeSignup()" class="w-full bg-green-500 text-white font-bold py-3 rounded-lg block hover:bg-green-600 transition">Create New Account</button>
            </form>
        </div>
    </div>


    <!-- 2. MAIN APP SCREEN (Hidden until logged in) -->
    <div id="app-screen" class="hidden min-h-screen pb-16">
        
        <!-- Top Navigation Bar -->
        <header class="bg-white shadow-sm sticky top-0 z-50 px-4 py-3 flex justify-between items-center border-b border-gray-200">
            <h1 class="text-blue-600 text-2xl font-bold tracking-tight">flexbook</h1>
            <button onclick="window.executeLogout()" class="text-gray-500 font-medium hover:text-red-500 bg-gray-100 px-3 py-1 rounded-lg text-sm">Log Out</button>
        </header>

        <!-- Main Content Area -->
        <main class="max-w-md mx-auto p-4 space-y-4">
            
            <!-- Create Post Box -->
            <div class="bg-white p-4 rounded-xl shadow-sm space-y-3 mb-4">
                <div class="flex items-center space-x-2">
                    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold" id="user-avatar">U</div>
                    <input type="text" id="post-input" placeholder="What's on your mind?" 
                        class="flex-1 bg-gray-100 rounded-full py-2 px-4 focus:outline-none focus:bg-gray-200 text-sm">
                </div>
                <button onclick="window.executePost()" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700 transition">Post</button>
            </div>

            <!-- Dynamic Feed Container -->
            <div id="posts-feed" class="space-y-4">
                <div class="text-center py-8 text-gray-500 text-sm bg-white rounded-xl shadow-sm">Loading your news feed...</div>
            </div>

        </main>
    </div>

    <!-- FIREBASE AND APP ENGINE MODULE -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://gstatic.com";
        import { getDatabase, ref, set, push, onValue, update } from "https://gstatic.com";

        // Your Firebase project configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCcwSy65AdFqgHDeKjw4xTTnvGdFQA9i6Y",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "flexbook-app-7c43c",
            storageBucket: "flexbook-app-7c43c.firebasestorage.app",
            messagingSenderId: "748070005411",
            appId: "1:748070005411:web:9d4082abb2886ebad8ed16"
        };

        // Initialize Services
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Elements
        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const emailInput = document.getElementById('auth-email');
        const passwordInput = document.getElementById('auth-password');
        const postInput = document.getElementById('post-input');
        const postsFeed = document.getElementById('posts-feed');
        const userAvatar = document.getElementById('user-avatar');

        let currentUser = null;

        // Monitor Login State Changing
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                userAvatar.innerText = user.email.charAt(0).toUpperCase();
                loadPosts();
            } else {
                currentUser = null;
                appScreen.classList.add('hidden');
                authScreen.classList.remove('hidden');
            }
        });

        // Sign Up Execution
        window.executeSignup = () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if(!email || !password) return alert("Please fill in fields!");
            createUserWithEmailAndPassword(auth, email, password)
                .then(() => alert("Account Created!"))
                .catch(err => alert(err.message));
        };

        // Login Execution
        window.executeLogin = () => {
            const email = emailInput.value.trim();
            const password = passwordInput.value;
            if(!email || !password) return alert("Please fill in fields!");
            signInWithEmailAndPassword(auth, email, password)
                .catch(err => alert(err.message));
        };

        // Logout Execution
        window.executeLogout = () => {
            signOut(auth).catch(err => err && alert(err.message));
        };

        // Create New Post
        window.executePost = () => {
            const text = postInput.value.trim();
            if(!text || !currentUser) return;

            const postsRef = ref(db, 'posts');
            const newPostRef = push(postsRef);
            
            set(newPostRef, {
                author: currentUser.email,
                content: text,
                timestamp: Date.now(),
                likesCount: 0,
                sharesCount: 0
            }).then(() => {
                postInput.value = "";
            }).catch(err => alert(err.message));
        };

        // Load Real-time Newsfeed
        function loadPosts() {
            const postsRef = ref(db, 'posts');
            onValue(postsRef, (snapshot) => {
                postsFeed.innerHTML = "";
                const data = snapshot.val();
                if (!data) {
                    postsFeed.innerHTML = `<div class="text-center py-8 text-gray-500 text-sm bg-white rounded-xl shadow-sm">No posts yet. Write something!</div>`;
                    return;
                }

                Object.entries(data).reverse().forEach(([postId, post]) => {
                    const cleanAuthor = post.author.split('@')[0];
                    const initial = cleanAuthor.charAt(0).toUpperCase();
                    
                    let commentsHtml = "";
                    if (post.comments) {
                        Object.values(post.comments).forEach(c => {
                            commentsHtml += `
                                <div class="bg-gray-100 p-2 rounded-lg text-xs">
                                    <span class="font-bold">${c.author.split('@')[0]}:</span> ${c.text}
                                </div>
                            `;
                        });
                    }

                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-xl shadow-sm space-y-3 mt-4";
                    card.innerHTML = `
                        <div class="flex items-center space-x-2">
                            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-xs">${initial}</div>
                            <div>
                                <h4 class="font-bold text-xs">${cleanAuthor}</h4>
                                <span class="text-gray-400 block" style="font-size:10px;">${new Date(post.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                            </div>
                        </div>
                        <p class="text-sm text-gray-800">${post.content}</p>
                        <div class="flex justify-between text-xs text-gray-400 pt-1 border-t border-gray-100">
                            <span>👍 ${post.likesCount || 0} Likes</span>
                            <span>🔄 ${post.sharesCount || 0} Shares</span>
                        </div>
                        <div class="grid grid-cols-3 gap-1 text-center text-xs font-bold text-gray-500 border-t border-b border-gray-100 py-1">
                            <button onclick="window.likePost('${postId}', ${post.likesCount || 0})">👍 Like</button>
